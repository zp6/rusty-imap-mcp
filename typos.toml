[default]
extend-ignore-re = [
    # Allow hex blobs used in doc examples
    "[0-9a-f]{32,}",
]

[default.extend-words]
# Intentional project vocabulary. Add sparingly with a comment.
imap = "imap"
rimap = "rimap"

[files]
extend-exclude = [
    "target/",
    "Cargo.lock",
    # Plan documents quote example source and deliberately-malformed test
    # fixtures (e.g. truncated JSON strings). Both produce false positives
    # that the typos auto-fixer turns into harmful edits.
    "docs/superpowers/plans/",
    # Adversarial email corpus contains Unicode-poisoning and other
    # deliberately-malformed text (e.g. zero-width codepoints that split
    # "hello" into "hel\u200blo"). Typos misreads the fragments and its
    # auto-fixer would destroy the fixtures.
    "tests/injection-corpus/",
]
