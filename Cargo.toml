[workspace]
resolver = "2"
members = [
    "crates/rimap-core",
    "crates/rimap-config",
    "crates/rimap-imap",
    "crates/rimap-content",
    "crates/rimap-audit",
    "crates/rimap-authz",
    "crates/rimap-server",
]

[workspace.package]
version = "0.0.0"
edition = "2024"
rust-version = "1.85.1"
license = "MIT OR Apache-2.0"
repository = "https://github.com/randomparity/rusty-imap-mcp"
authors = ["David Christensen"]
readme = "README.md"

# Dependency versions are declared once here and inherited by member crates via
# `foo = { workspace = true }`. No member crate may declare a version directly.
[workspace.dependencies]
# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Serde / config
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"

# Paths
directories = "5.0"

# Credentials
keyring = { version = "3.6", features = ["apple-native", "linux-native-sync-persistent"] }
rpassword = "7.3"

# Authorization primitives
governor = "0.7"
nonzero_ext = "0.3"
parking_lot = "0.12"

# Async runtime
tokio = { version = "1.42", features = ["rt-multi-thread", "macros", "time", "sync"] }

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

# CLI
clap = { version = "4.5", features = ["derive", "env"] }

# Dev dependencies shared across crates
assert_cmd = "2.0"
predicates = "3.1"
tempfile = "3.14"
proptest = "1.6"
temp-env = "0.3"

[workspace.lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
# Panic prevention
unwrap_used = "deny"
expect_used = "warn"
panic = "deny"
panic_in_result_fn = "deny"
unimplemented = "deny"
# No cheating
allow_attributes = "deny"
# Code hygiene
dbg_macro = "deny"
todo = "deny"
print_stdout = "deny"
print_stderr = "deny"
# Safety
await_holding_lock = "deny"
large_futures = "deny"
exit = "deny"
mem_forget = "deny"
# Pedantic relaxations (too noisy in practice)
module_name_repetitions = "allow"
similar_names = "allow"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "debuginfo"
