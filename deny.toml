# cargo-deny policy for rusty-imap-mcp. Four concerns: advisories, licenses,
# bans (duplicate versions, disallowed crates), and sources (registry allowlist).

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "MPL-2.0",
    # webpki-roots >= 0.26.10 re-licensed from MPL-2.0 to CDLA-Permissive-2.0
    # (Community Data License Agreement). It's a legitimate permissive license
    # published by the Linux Foundation. Accepted here because the alternative
    # is pinning to stale root certs.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
# Documented exceptions. Each entry must justify why a workaround is preferable
# to upgrading the offending dependency.
skip = [
    # `hashbrown` 0.14 is pulled in by `dashmap` (transitive of `governor`),
    # while 0.16 comes in via `indexmap` (transitive of `toml`). Both are
    # stable upstream choices we cannot influence without forking.
    { name = "hashbrown", version = "0.14" },

    # The four entries below all trace to `async-imap 0.11.2` â€” the only
    # maintained pure-Rust async IMAP client. Its direct deps include
    # `stop-token 0.7` (last released 2022, unmaintained but harmless) which
    # pulls the 1.x line of the `async` runtime primitives, while async-imap
    # itself uses the 2.x line. `thiserror 1` is also a direct, non-optional
    # pin from async-imap. None can be resolved with `cargo update`; forking
    # async-imap is not warranted. Revisit when async-imap modernizes.
    { name = "async-channel", version = "1" },
    { name = "event-listener", version = "2" },
    { name = "thiserror", version = "1" },
    { name = "thiserror-impl", version = "1" },

    # `utf7-imap 0.3.2` depends on `base64 0.13`, while `async-imap` and
    # `rmcp` use `base64 0.22`. utf7-imap is unmaintained upstream with
    # this pin; the older base64 is a pure encoder/decoder with no
    # security advisories. Revisit if utf7-imap publishes a 0.4 bump.
    { name = "base64", version = "0.13" },
]
# Multiple `windows-sys` major lines coexist because each transitive
# consumer (`directories`, `keyring`/`dbus-secret-service`, `rpassword`,
# `clap`/`anstream`, `tempfile`/`rustix`) pins to a different release of the
# Windows ABI shim. Skipping the older subtrees keeps Windows targets in
# cargo-deny scope without forcing a coordinated upgrade across unrelated
# ecosystems. The newest version (0.61) remains the canonical one.
skip-tree = [
    { name = "windows-sys", version = "0.48" },
    { name = "windows-sys", version = "0.52" },
    { name = "windows-sys", version = "0.59" },

    # Sprint 4b: the html5ever ecosystem is mid-split. `scraper 0.26` (our
    # HTML parser) has migrated to html5ever 0.39 / markup5ever 0.39 /
    # web_atoms 0.2 / string_cache 0.9 / tendril 0.5, while `ammonia 4.1`
    # (our sanitizer) still pins html5ever 0.35 and the matching older
    # markup5ever/web_atoms/string_cache/tendril line. Both are the latest
    # releases on crates.io (checked 2026-04-08). We cannot unify without
    # forking ammonia or scraper. Skip the older subtrees rooted at
    # html5ever 0.35 and cssparser 0.35 so cargo-deny accepts the duplicate
    # versions of markup5ever, web_atoms, string_cache, string_cache_codegen,
    # and tendril that they drag in.
    #
    # SECURITY NOTE (dual tokenizer). scraper 0.26 uses html5ever 0.39;
    # ammonia 4.1 uses html5ever 0.35. The same HTML body is parsed twice
    # in Sprint 4b's html pipeline â€” once by scraper for inspection
    # (hidden-element detection, anchor href extraction) and once by
    # ammonia for sanitization. Any divergence between the two html5ever
    # versions' tokenization rules is a potential sanitizer-bypass vector:
    # an attacker could craft input that parses one way in scraper's
    # detectors and a different way in ammonia's output. The Sprint 4b
    # pipeline runs BOTH engines on the same raw input by design:
    # scraper inspects the unsanitized DOM to count hidden elements,
    # strip-warnings, and href-mismatches (stages 4-6 in the plan), and
    # ammonia produces the sanitized body_html rendering (stage 7).
    # Neither engine's output is fed into the other -- they are parallel
    # views of the same bytes. Divergence between the two html5ever
    # versions therefore manifests as: scraper sees a script that
    # ammonia did not, or vice versa; one engine resolves an anchor
    # differently than the other; an attribute parses differently.
    # Task 17's adversarial corpus MUST include at least one fixture
    # exercising tokenizer divergence between html5ever 0.35 and 0.39
    # so the divergence surface is observable in tests, not implicit.
    # Task 10 must NOT reorder the pipeline to "sanitize first" --
    # doing so would hollow out every HtmlHiddenContentStripped /
    # HtmlScriptStripped / HtmlStyleStripped / HtmlRemoteImageStripped /
    # HtmlLinkTextHrefMismatch warning by running detection against
    # the already-clean output. Remove both skip-tree entries below
    # when ammonia publishes a release that bumps to html5ever 0.39+ /
    # cssparser 0.36+; track https://github.com/rust-ammonia/ammonia for
    # the upstream bump.
    # NOTE: cargo-deny interprets bare version strings as caret ranges
    # (e.g., "0.35" matches ">=0.35.0, <0.36.0"). This is intentional
    # here â€” ammonia floats its own transitive html5ever pin.
    { name = "html5ever", version = "0.35" },
    { name = "cssparser", version = "0.35" },
]
# psl (via addr) uses a versioning scheme where the patch number
# tracks the Public Suffix List snapshot date (e.g. 2.1.200). This
# is legitimate but looks like a massive version bump to naive
# pattern matching.

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
