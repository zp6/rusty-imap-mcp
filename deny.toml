# cargo-deny policy for rusty-imap-mcp. Four concerns: advisories, licenses,
# bans (duplicate versions, disallowed crates), and sources (registry allowlist).

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "MPL-2.0",
    # webpki-roots >= 0.26.10 re-licensed from MPL-2.0 to CDLA-Permissive-2.0
    # (Community Data License Agreement). It's a legitimate permissive license
    # published by the Linux Foundation. Accepted here because the alternative
    # is pinning to stale root certs.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
# Documented exceptions. Each entry must justify why a workaround is preferable
# to upgrading the offending dependency.
skip = [
    # `hashbrown` 0.14 is pulled in by `dashmap` (transitive of `governor`),
    # while 0.16 comes in via `indexmap` (transitive of `toml`). Both are
    # stable upstream choices we cannot influence without forking.
    { name = "hashbrown", version = "0.14" },

    # The four entries below all trace to `async-imap 0.11.2` — the only
    # maintained pure-Rust async IMAP client. Its direct deps include
    # `stop-token 0.7` (last released 2022, unmaintained but harmless) which
    # pulls the 1.x line of the `async` runtime primitives, while async-imap
    # itself uses the 2.x line. `thiserror 1` is also a direct, non-optional
    # pin from async-imap. None can be resolved with `cargo update`; forking
    # async-imap is not warranted. Revisit when async-imap modernizes.
    { name = "async-channel", version = "1" },
    { name = "event-listener", version = "2" },
    { name = "thiserror", version = "1" },
    { name = "thiserror-impl", version = "1" },
]
# Multiple `windows-sys` major lines coexist because each transitive
# consumer (`directories`, `keyring`/`dbus-secret-service`, `rpassword`,
# `clap`/`anstream`, `tempfile`/`rustix`) pins to a different release of the
# Windows ABI shim. Skipping the older subtrees keeps Windows targets in
# cargo-deny scope without forcing a coordinated upgrade across unrelated
# ecosystems. The newest version (0.61) remains the canonical one.
skip-tree = [
    { name = "windows-sys", version = "0.48" },
    { name = "windows-sys", version = "0.52" },
    { name = "windows-sys", version = "0.59" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
