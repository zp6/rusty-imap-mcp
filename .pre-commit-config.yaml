# prek (pre-commit-in-Rust) configuration for rusty-imap-mcp.
#
# Fast blocking checks run on every commit; slower checks run on push.
# Hook revs are cooldown-managed via `prek auto-update --cooldown-days 7`.

default_install_hook_types: [pre-commit, pre-push]
fail_fast: false

repos:
  # Generic whitespace and basic hygiene.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(tests/injection-corpus/|crates/rimap-content/data/confusables\.txt$)
      - id: end-of-file-fixer
        # Email fixtures are byte-exact; auto-appending a final newline
        # (or stripping a trailing CRLF pair) corrupts them. The vendored
        # Unicode 16 confusables.txt is byte-identical to the upstream
        # file and must not be mangled.
        exclude: ^(tests/injection-corpus/|crates/rimap-content/data/confusables\.txt$)
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
        # The oversized-body adversarial fixture intentionally exceeds
        # MAX_BODY_BYTES (1 MiB) to exercise the truncation warning,
        # and its insta snapshot captures the same ~1 MiB body. The
        # vendored Unicode 16 confusables.txt is ~700 KB.
        exclude: ^(tests/injection-corpus/|crates/rimap-content/tests/snapshots/|crates/rimap-content/data/confusables\.txt$)
      - id: mixed-line-ending
        args: ["--fix=lf"]
        # RFC 5322 email messages require CRLF line endings; the
        # adversarial corpus depends on CRLF to exercise header parsing
        # and the pre-parse scrub. The auto-fixer would silently
        # destroy the fixtures.
        exclude: ^tests/injection-corpus/

  # Rust formatting and linting (pre-commit stage).
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-commit]

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets --locked -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-commit]

      - id: branch-name
        name: refuse commits on main/master
        entry: scripts/check-branch-name.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: forbidden-macros
        name: forbid println!/dbg!/todo! in non-test Rust source
        entry: scripts/check-forbidden-macros.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # Shell script hygiene.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: \.sh$

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-2
    hooks:
      - id: shfmt
        args: ["-i", "4", "-d"]

  # GitHub Actions lint + security audit (only when touched).
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
        files: ^\.github/workflows/.*\.ya?ml$

  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: v1.5.2
    hooks:
      - id: zizmor
        files: ^\.github/workflows/.*\.ya?ml$

  # Typo checker.
  - repo: https://github.com/crate-ci/typos
    rev: v1.29.4
    hooks:
      - id: typos

  # Pre-push stage: slower tests and audits.
  - repo: local
    hooks:
      - id: cargo-nextest
        name: cargo nextest run --workspace
        entry: cargo nextest run --workspace --locked --no-tests=pass
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

      - id: cargo-deny
        name: cargo deny check advisories bans
        entry: cargo deny check advisories bans
        language: system
        pass_filenames: false
        stages: [pre-push]
