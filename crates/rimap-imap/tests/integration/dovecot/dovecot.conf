dovecot_config_version = 2.4.4
dovecot_storage_version = 2.4.4

protocols = imap

ssl = required
ssl_server_cert_file = /etc/dovecot/cert.pem
ssl_server_key_file = /etc/dovecot/key.pem
ssl_min_protocol = TLSv1.2

auth_allow_cleartext = no
login_trusted_networks =

mail_driver = maildir
mail_path = ~/Maildir

passdb passwd-file {
  passwd_file_path = /etc/dovecot/users
  default_password_scheme = PLAIN
}

userdb static {
  fields {
    uid = 1000
    gid = 1000
    home = /var/mail/%{user}
  }
}

namespace inbox {
  inbox = yes
  separator = /

  mailbox Drafts {
    special_use = \Drafts
    auto = subscribe
  }
  mailbox Junk {
    special_use = \Junk
    auto = subscribe
  }
  mailbox Sent {
    special_use = \Sent
    auto = subscribe
  }
  mailbox Trash {
    special_use = \Trash
    auto = subscribe
  }
}

service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

log_path = /dev/stderr
info_log_path = /dev/stderr
debug_log_path = /dev/stderr
