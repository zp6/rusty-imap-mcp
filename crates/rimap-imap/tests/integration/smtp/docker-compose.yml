services:
  smtp:
    # Mailpit: SMTP sink with HTTP API for test assertions.
    # Pinned to exact version — update via Dependabot or manually.
    image: docker.io/axllent/mailpit:v1.29.5
    container_name: ${COMPOSE_PROJECT_NAME:-rimap-it}-smtp
    ports:
      # Loopback-only. Host ports pre-allocated by the Rust harness.
      - "127.0.0.1:${RIMAP_SMTP_HOST_PORT}:1025"    # SMTP
      - "127.0.0.1:${RIMAP_SMTP_API_PORT}:8025"      # HTTP API
    environment:
      # Disable authentication — tests send without credentials.
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      # Disable TLS — tests run over plaintext on loopback.
      MP_SMTP_TLS_CERT: ""
      MP_SMTP_TLS_KEY: ""
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/api/v1/info"]
      interval: 1s
      timeout: 1s
      retries: 15
