name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1 (toolchain: 1.94.0) # zizmor: ignore[superfluous-actions]
        with:
          toolchain: 1.94.0
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Install libdbus-1-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1 (toolchain: 1.94.0) # zizmor: ignore[superfluous-actions]
        with:
          toolchain: 1.94.0
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  check-macos:
    name: check (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1 (toolchain: 1.94.0) # zizmor: ignore[superfluous-actions]
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          key: macos
      - run: cargo check --workspace --locked --all-targets

  test:
    name: test (stable)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Install libdbus-1-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1 (toolchain: 1.94.0) # zizmor: ignore[superfluous-actions]
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - uses: taiki-e/install-action@1329c298aa20c3257846c9b2e0e55967df3e3c37  # v2.75.25
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace --locked --no-tests=pass
      - name: Phase 3 wire e2e — fail if zero tests selected
        run: |
          cargo nextest run -p rimap-server --test e2e_wire \
            --locked --no-tests=fail \
            --no-capture
        env:
          RIMAP_REQUIRE_DOCKER: "1"

  msrv:
    name: test (MSRV 1.88.0)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Install libdbus-1-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1 (toolchain: 1.88.0) # zizmor: ignore[superfluous-actions]
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          key: msrv
      - run: cargo check --workspace --all-targets --all-features --locked
      - uses: taiki-e/install-action@1329c298aa20c3257846c9b2e0e55967df3e3c37  # v2.75.25
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace --locked --no-tests=pass

  tool-schema-drift:
    name: tool-schema drift
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Install libdbus-1-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1 (toolchain: 1.94.0) # zizmor: ignore[superfluous-actions]
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          key: tool-schema-drift
      - uses: taiki-e/install-action@1329c298aa20c3257846c9b2e0e55967df3e3c37  # v2.75.25
        with:
          tool: just
      - name: Regenerate tool schemas
        run: just regen-tool-schemas
      - name: Verify no schema drift
        run: |
          if ! git diff --exit-code crates/rimap-server/tests/fixtures/rimap-tool-schemas/; then
            git diff --stat crates/rimap-server/tests/fixtures/rimap-tool-schemas/
            echo "::error::Tool schemas are out of sync — run 'just regen-tool-schemas' and commit the updated fixture files"
            exit 1
          fi

  deny:
    name: cargo-deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb  # v2.0.17
        with:
          command: check advisories licenses bans sources

  zizmor:
    name: zizmor self-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@1329c298aa20c3257846c9b2e0e55967df3e3c37  # v2.75.25
        with:
          tool: zizmor
      - run: zizmor .github/workflows/

  sonarqube:
    name: SonarQube
    # Skip on PRs from forks and from Dependabot (neither can access the
    # SONAR_TOKEN secret). Skipped required checks satisfy branch protection.
    if: >-
      github.actor != 'dependabot[bot]'
      && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
    runs-on: ubuntu-24.04
    # SONAR_TOKEN lives in the `sonarcloud` environment for future hardening
    # (branch restrictions, required reviewers) without changing the workflow.
    environment: sonarcloud
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          # Shallow clones disable blame information needed by SonarCloud.
          fetch-depth: 0
      - name: Install libdbus-1-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1 (toolchain: 1.94.0) # zizmor: ignore[superfluous-actions]
        with:
          toolchain: 1.94.0
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          key: sonarqube
      - uses: taiki-e/install-action@1329c298aa20c3257846c9b2e0e55967df3e3c37  # v2.75.25
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage report
        run: cargo llvm-cov --locked --workspace --all-features --lcov --output-path lcov.info
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432  # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  mcp-conformance-node:
    name: mcp-conformance (Node)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      # libdbus-1-dev + pkg-config are required because the workspace
      # keyring dependency enables Linux native keyring (secret-service)
      # support, which links against libdbus at build time. Every
      # existing Ubuntu Rust build job in this workflow installs these
      # for the same reason.
      - name: Install libdbus-1-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1 (toolchain: 1.94.0) # zizmor: ignore[superfluous-actions]
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          key: mcp-conformance-node

      # --features test-support activates the --allow-empty-accounts
      # CLI flag (#[cfg(feature = "test-support")] in rimap-server).
      # Without it, the Node harness hits a clap rejection before the
      # MCP handshake.
      - name: Build rusty-imap-mcp (debug, test-support)
        run: cargo build -p rimap-server --bin rusty-imap-mcp --features test-support --locked

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788  # v6.0.6
        with:
          version: 11.1.1
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: tests/mcp-conformance/pnpm-lock.yaml

      - name: Install Node deps
        working-directory: tests/mcp-conformance
        run: pnpm install --frozen-lockfile

      - name: Type-check
        working-directory: tests/mcp-conformance
        run: pnpm lint

      - name: Format check
        working-directory: tests/mcp-conformance
        run: pnpm format:check

      - name: Run conformance suite
        working-directory: tests/mcp-conformance
        env:
          RUSTY_IMAP_MCP_BIN: ${{ github.workspace }}/target/debug/rusty-imap-mcp
        run: pnpm test
